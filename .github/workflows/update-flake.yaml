name: Update flake inputs
run-name: Update flake inputs by ${{ github.actor }}
on:
  schedule:
    - cron: "0 0 */3 * *" # Every 3 days at midnight UTC
  workflow_dispatch:
jobs:
  update:
    name: Update flake inputs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Nix
        uses: cachix/install-nix-action@v31
      - name: Update flake.lock
        id: update
        uses: DeterminateSystems/update-flake-lock@v27
        with:
          commit-msg: "chore: update flake inputs"
          pr-labels: dependencies
          pr-title: "chore: update flake inputs"
      - name: Enable auto-merge
        if: steps.update.outputs.pull-request-url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.update.outputs.pull-request-url }}
        run: gh pr merge --auto --squash "$PR_URL"
